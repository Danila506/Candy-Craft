name: CI

permissions:
  contents: read
  pull-requests: read


on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      root: ${{ steps.filter.outputs.root }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            root:
              - 'package.json'
              - 'package-lock.json'
              - '.github/**'
              - '.husky/**'
              - 'commitlint.config.*'
              - '.eslintrc*'
              - '.prettierrc*'
              - 'prettier.config.*'
              - '.editorconfig'
              - '.gitattributes'
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  root:
    name: Root
    needs: changes
    if: needs.changes.outputs.root == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps (root)
        run: npm ci

      - name: Root checks (optional)
        run: |
          npm run lint --if-present
          npm test --if-present
          npm run build --if-present

  backend:
    name: Backend (Nest)
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build --if-present

  frontend:
    name: Frontend (React)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present
  
  final:
    name: CI
    needs: [root, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI passed"
